<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Olcha — Focus Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --red: #C0593A;
    --red-light: #FAECE7;
    --red-dark: #8B3A22;
    --bg: #FAFAF8;
    --bg2: #F3F1EE;
    --border: rgba(0,0,0,0.08);
    --text: #1A1A18;
    --text2: #6B6B66;
    --white: #FFFFFF;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  .status-bar {
    width: 100%;
    max-width: 430px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
  }

  .wrap { width: 100%; max-width: 430px; padding: 0 16px; }

  .header { display: flex; align-items: center; gap: 10px; padding: 20px 0 16px; }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--red);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .timer-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .time-display {
    font-size: 44px;
    font-family: 'DM Mono', monospace;
  }

  .btn-start {
    background: var(--red);
    color: white;
    border: none;
    padding: 15px 25px;
    border-radius: 50px;
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- 🌧️ YOMG‘IR AUDIO (QO‘SHILDI) -->
<audio id="rainAudio" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f6b2b2.mp3?filename=rain-ambient-110622.mp3" type="audio/mpeg">
</audio>

<div class="status-bar">
  <span id="clockNow">09:41</span>
  <span>📶 🔋</span>
</div>

<div class="wrap">

  <div class="header">
    <div class="logo-icon">🍒</div>
    <div>
      <h1>Olcha</h1>
      <p>Focus Timer</p>
    </div>
  </div>

  <div class="timer-card">
    <div class="time-display" id="tDisp">45:00</div>

    <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
  </div>

</div>

<script>
  let totalSecs = 45*60;
  let remaining = totalSecs;
  let running = false;
  let iv = null;

  // 🌧️ RAIN AUDIO
  const rainAudio = document.getElementById("rainAudio");

  function toggleTimer() {
    if (running) {
      clearInterval(iv);
      running = false;
      document.getElementById("startBtn").textContent = "Start";

      // STOP RAIN
      rainAudio.pause();
      rainAudio.currentTime = 0;

    } else {
      running = true;
      document.getElementById("startBtn").textContent = "Pauza";

      // START RAIN (FIXED)
      rainAudio.volume = 0.4;
      rainAudio.currentTime = 0;
      rainAudio.play().catch(()=>{});

      iv = setInterval(() => {
        remaining--;

        let m = String(Math.floor(remaining/60)).padStart(2,"0");
        let s = String(remaining%60).padStart(2,"0");

        document.getElementById("tDisp").textContent = m+":"+s;

        if (remaining <= 0) {
          clearInterval(iv);
          running = false;
          document.getElementById("startBtn").textContent = "Start";

          rainAudio.pause();
          rainAudio.currentTime = 0;
        }

      }, 1000);
    }
  }
</script>

</body>
</html>
