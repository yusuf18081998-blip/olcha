<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Olcha — Focus Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ====== SIZNING BARCHA CSS O‘ZGARMAGAN ====== */
/* (hech narsaga tegilmadi, to‘liq sizniki) */
</style>
</head>

<body>

<!-- 🌧️ RAIN AUDIO QO‘SHILDI -->
<audio id="rainAudio" loop preload="auto">
  <source src="https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg" type="audio/ogg">
</audio>

<div class="status-bar">
  <span class="status-time" id="clockNow">09:41</span>
  <div class="status-icons">
    <span>📶</span>
    <span>🔋</span>
  </div>
</div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-icon">🍒</div>
    <div class="header-text">
      <h1>Olcha</h1>
      <p>Focus Timer & Tasks</p>
    </div>
    <div class="header-right">
      <div class="streak-badge" id="streakBadge">🔥 0 kun</div>
    </div>
  </div>

  <!-- TIMER CARD -->
  <div class="timer-card">
    <div class="mode-tabs">
      <button class="mode-btn active" onclick="setMode('focus',45,'Diqqat vaqti')">Diqqat</button>
      <button class="mode-btn" onclick="setMode('short',5,'Qisqa tanaffus')">Tanaffus</button>
      <button class="mode-btn" onclick="setMode('long',25,'Uzoq tanaffus')">Uzoq</button>
    </div>

    <div class="circle-wrap">
      <svg class="circle-svg" viewBox="0 0 200 200">
        <circle class="c-bg" cx="100" cy="100" r="90"/>
        <circle class="c-prog" id="prog" cx="100" cy="100" r="90"/>
      </svg>
      <div class="circle-inner">
        <div class="time-display" id="tDisp">45:00</div>
        <div class="time-label" id="tLabel">Diqqat vaqti</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-round" onclick="resetTimer()">↺</button>
      <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
      <button class="btn-round" onclick="skipSession()">⏭</button>
    </div>

    <div class="session-dots" id="dots"></div>
  </div>

</div>

<script>
  let totalSecs = 45*60, remaining = 45*60;
  let running = false, iv = null;

  let musicOn = false;
  let audioCtx = null;
  let musicNodes = [];
  let masterGain = null;

  // 🌧️ RAIN AUDIO
  const rainAudio = document.getElementById("rainAudio");

  function startMusic() {
    if (musicOn) return;
    musicOn = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);

    // 🌧️ YOMG‘IRNI YURDIRISH
    rainAudio.volume = 0.4;
    rainAudio.play();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 220;

    gain.gain.value = 0.05;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    musicNodes.push(osc, gain);
  }

  function stopMusic() {
    musicOn = false;

    musicNodes.forEach(n => {
      try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){}
    });

    musicNodes = [];

    if (audioCtx) {
      audioCtx.close();
      audioCtx = null;
    }

    // 🌧️ YOMG‘IRNI TO‘XTATISH
    rainAudio.pause();
    rainAudio.currentTime = 0;
  }

  function toggleTimer() {
    if (running) {
      clearInterval(iv);
      running = false;
      stopMusic();
      document.getElementById('startBtn').textContent = "Davom";
    } else {
      running = true;
      startMusic();

      document.getElementById('startBtn').textContent = "Pauza";

      iv = setInterval(() => {
        remaining--;

        if (remaining <= 0) {
          clearInterval(iv);
          running = false;
          stopMusic();
          remaining = 0;
          document.getElementById('startBtn').textContent = "Start";
        }

        let m = String(Math.floor(remaining/60)).padStart(2,"0");
        let s = String(remaining%60).padStart(2,"0");
        document.getElementById("tDisp").textContent = m+":"+s;

      }, 1000);
    }
  }

  function resetTimer(){
    clearInterval(iv);
    running = false;
    remaining = totalSecs;
    stopMusic();
    document.getElementById('startBtn').textContent = "Start";
  }

  function skipSession(){
    resetTimer();
  }
</script>

</body>
</html>
