<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olcha PRO — Focus</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.time{
  font-size:40px;
  margin:20px 0;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.start{background:#C0593A;color:#fff;}
.stop{background:#444;color:#fff;}

small{color:gray;}
</style>
</head>

<body>

<div class="card">
  <h2>🍒 Olcha PRO</h2>

  <div class="time" id="time">25:00</div>

  <button class="start" onclick="startAll()">Start</button>
  <button class="stop" onclick="stopAll()">Stop</button>

  <br><br>

  🌧️ Rain volume<br>
  <input type="range" min="0" max="100" value="40" oninput="setRain(this.value)">

  <br><br>
  <small>Focus + Rain + Music</small>
</div>

<!-- 🌧️ RAIN AUDIO -->
<audio id="rain" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f6b2b2.mp3?filename=rain-ambient-110622.mp3" type="audio/mpeg">
</audio>

<script>
let t = 25*60;
let iv = null;
let running = false;

let audioCtx = null;
let rain = document.getElementById("rain");

// TIMER
function startTimer(){
  iv = setInterval(()=>{
    if(t<=0){
      stopAll();
      return;
    }
    t--;
    let m = String(Math.floor(t/60)).padStart(2,"0");
    let s = String(t%60).padStart(2,"0");
    document.getElementById("time").innerText = m+":"+s;
  },1000);
}

// 🌧️ + 🎵 START
function startAll(){

  if(!running){
    running = true;

    // audio context (required fix)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // rain start (fixed)
    rain.volume = 0.4;
    rain.currentTime = 0;

    rain.play().catch(e=>{
      console.log("Rain blocked:", e);
    });

    // soft focus tone (optional PRO vibe)
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 200;
    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    startTimer();
  }
}

// STOP EVERYTHING
function stopAll(){
  running = false;
  clearInterval(iv);
  t = 25*60;

  document.getElementById("time").innerText = "25:00";

  if(rain){
    rain.pause();
    rain.currentTime = 0;
  }

  if(audioCtx){
    audioCtx.close();
    audioCtx = null;
  }
}

// RAIN CONTROL
function setRain(v){
  rain.volume = v/100;
}
</script>

</body>
</html>
